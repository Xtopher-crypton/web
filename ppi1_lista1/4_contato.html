<!DOCTYPE html>
<html lang="en">
<head link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Formulario Contato</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Formulário de Contato</h1>

<p><strong>Preencha os campos abaixo para entrar em contato.</strong></p>

<hr>

<form>

    <label for="nome">Nome:</label><br>
    <input type="text" id="nome" placeholder="Digite seu nome" required><br><br>

    <label for="email">E-mail:</label><br>
    <input type="email" id="email" placeholder="Digite seu e-mail" required><br><br>

    <label for="assunto">Assunto:</label><br>
    <input type="text" id="assunto" placeholder="Digite o assunto"><br><br>

    <label for="estado">Estado:</label><br>
    <select id="estado">
        <option>SC</option>
        <option>PR</option>
        <option>RS</option>
        <option>SP</option>
    </select><br><br>

    <label for="mensagem">Mensagem:</label><br>
    <textarea id="mensagem" placeholder="Digite sua mensagem"></textarea><br><br>

    <button type="submit">Enviar</button>

</form>

<hr>

<a href="3_tabela_uf.html">Voltar para tabela de estados</a>

</body>
</html>
