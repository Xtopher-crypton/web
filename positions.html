<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{border: 1px solid red; margin: 0px; padding: 0px;}
        .box{display: inline-block;
        width: 100px;
        height: 100px;
        border-color: black;
    }
        #box1{background-color: hotpink;
        position: relative;
        top: 100px;
        left: 150px;
    }
        #box2{background-color: gray;
        position: static;
        top:200px;
    }
        #box3{background-color: yellow;
        position: absolute;
        top: 5px;
    }
        #box4{background-color: blue;
        position: fixed;
        bottom: 0px;
        right: 0px;
    }
        #box5{background-color: purple;}
        span:last-child{background-color: red;}
    </style>
</head>
<body>
    <div id="container">
        <!-- div#box$.box{$}*5 -->
        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
        <div id="box5" class="box">5</div>
        <span class="box">6</span>
    </div>
</body>
</html>
