<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt e Alert</title>
</head>
<body>
    <h1>Utilize o prompt e alert</h1>

    <script>
        window.onload = function() {
            const nome = prompt("Qual é o seu nome?");
            if (nome) {
                alert("Olá, " + nome + "!");
            }
        };
    </script>
</body>
</html>
