<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Números Aleatórios</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        div { margin-bottom: 10px; }
        label { display: inline-block; width: 80px; }
        input { width: 100px; padding: 5px; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #resultadoSorteio { margin-top: 20px; border: 1px solid #ccc; padding: 10px; min-height: 50px; }
    </style>
</head>
<body>
    <h1>Sorteio de Números</h1>
    <div>
        <label for="min">Mínimo:</label>
        <input type="number" id="min" value="1">
    </div>
    <div>
        <label for="max">Máximo:</label>
        <input type="number" id="max" value="100">
    </div>
    <button onclick="sortear()">Sortear</button>
    <div id="resultadoSorteio"></div>

    <script>
        let numerosSorteados = [];

        function sortear() {
            const min = parseInt(document.getElementById("min").value);
            const max = parseInt(document.getElementById("max").value);

            if (isNaN(min) || isNaN(max) || min > max) {
                alert("Por favor, insira um intervalo válido.");
                return;
            }

            const numeroAleatorio = Math.floor(Math.random() * (max - min + 1)) + min;

            let encontrado = false;
            for (let i = 0; i < numerosSorteados.length; i++) {
                if (numerosSorteados[i].numero === numeroAleatorio) {
                    numerosSorteados[i].contagem++;
                    encontrado = true;
                    break;
                }
            }

            if (!encontrado) {
                numerosSorteados.push({ numero: numeroAleatorio, contagem: 1 });
            }

            exibirResultados();
        }

        function exibirResultados() {
            const resultadoDiv = document.getElementById("resultadoSorteio");
            resultadoDiv.innerHTML = "<h2>Números Sorteados:</h2>";
            if (numerosSorteados.length === 0) {
                resultadoDiv.innerHTML += "<p>Nenhum número sorteado ainda.</p>";
                return;
            }

            const ul = document.createElement("ul");
            numerosSorteados.forEach(item => {
                const li = document.createElement("li");
                li.innerText = `${item.numero} (sorteado ${item.contagem} vez(es))`;
                ul.appendChild(li);
            });
            resultadoDiv.appendChild(ul);
        }
    </script>
</body>
</html>
