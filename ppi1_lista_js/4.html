<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de IMC</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        div { margin-bottom: 10px; }
        label { display: inline-block; width: 80px; }
        input { width: 150px; padding: 5px; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #imgPerfil { max-width: 200px; margin-top: 20px; display: block; }
    </style>
</head>
<body>
    <h1>Cálculo de IMC</h1>
    <div>
        <label for="nome">Nome:</label>
        <input type="text" id="nome">
    </div>
    <div>
        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" step="0.1">
    </div>
    <div>
        <label for="altura">Altura (m):</label>
        <input type="number" id="altura" step="0.01">
    </div>
    <button onclick="calcularIMC()">Calcular</button>
    <p id="resultadoIMC"></p>
    <p id="classificacao"></p>
    <img id="imgPerfil" src="img/perfil.jpg" alt="Imagem de perfil">

    <script>
        function calcularIMC() {
            const nome = document.getElementById('nome').value;
            const peso = parseFloat(document.getElementById('peso').value);
            const altura = parseFloat(document.getElementById('altura').value);

            if (!nome || isNaN(peso) || isNaN(altura) || peso <= 0 || altura <= 0) {
                alert('Por favor, preencha todos os campos corretamente.');
                return;
            }

            const imc = peso / (altura * altura);
            document.getElementById('resultadoIMC').innerText = `IMC: ${imc.toFixed(2)}`;

            let classificacao = '';
            let imagemSrc = '';

            // Lógica baseada na tabela de IMC e nos nomes de arquivos fornecidos
            if (imc < 18.5) {
                classificacao = 'Abaixo do peso';
                imagemSrc = 'img/abaixopeso.png';
            } else if (imc >= 18.5 && imc < 24.9) {
                classificacao = 'Peso normal';
                imagemSrc = 'img/normal.png';
            } else if (imc >= 25 && imc < 29.9) {
                classificacao = 'Sobrepeso';
                imagemSrc = 'img/sobrepeso.png';
            } else if (imc >= 30 && imc < 34.9) {
                classificacao = 'Obesidade grau 1';
                imagemSrc = 'img/obesidade1.png';
            } else if (imc >= 35 && imc < 39.9) {
                classificacao = 'Obesidade grau 2';
                imagemSrc = 'img/obesidade2.png';
            } else {
                classificacao = 'Obesidade grau 3 (mórbida)';
                imagemSrc = 'img/obesidade3.png';
            }
            
            document.getElementById('classificacao').innerText = `Classificação: ${classificacao}`;
            document.getElementById('imgPerfil').src = imagemSrc;
            document.getElementById('imgPerfil').alt = classificacao;
        }
    </script>
</body>
</html>
