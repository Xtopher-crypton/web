<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 2</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            display: grid;
            height: 100vh;
            grid-template-areas: 
                "header header"
                "nav content"
                "footer footer";
            grid-template-columns: 200px 1fr;
            grid-template-rows: 80px 1fr 60px;
            gap: 0;
        }
        header {
            grid-area: header;
            background: linear-gradient(90deg, #7b1fa2 0%, #e91e63 100%);
            padding: 0;
            color: white;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        nav {
            grid-area: nav;
            background: #cddc39;
            padding: 0;
            color: #333;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        main {
            grid-area: content;
            background: #ffb74d;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .content-inner {
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 15px;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-items: center;
        }
        .box {
            background: #ffcc99;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #333;
        }
        .box:first-child {
            width: 120px;
            height: 100px;
        }
        .box:last-child {
            width: 100%;
            height: 100px;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
        }
        .text-line {
            width: 100%;
            height: 3px;
            background: #333;
        }
        footer {
            grid-area: footer;
            background: #4db6ac;
            padding: 0;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>Header</header>
        <nav>Nav</nav>
        <main>
            <div class="content-inner">
                <div class="box"></div>
                <div class="box">
                    <div class="text-line"></div>
                    <div class="text-line"></div>
                    <div class="text-line"></div>
                </div>
            </div>
        </main>
        <footer>Footer</footer>
    </div>
</body>
</html>
