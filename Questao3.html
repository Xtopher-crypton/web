<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 3</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 15px;
        }
        .item {
            background-color: #444;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            border-radius: 5px;
        }
        .a {
            grid-column: 1 / 4;
            grid-row: 1 / 2;
        }
        .b {
            grid-column: 5 / 6;
            grid-row: 1 / 2;
        }
        .c {
            grid-column: 1 / 3;
            grid-row: 2 / 4;
            align-items: flex-start;
            padding-top: 20px;
            padding-left: 20px;
            justify-content: flex-start;
        }
        .inner-box {
            grid-column: 3 / 6;
            grid-row: 2 / 4;
            background-color: #333;
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
        }
        .inner-item {
            background-color: #bbb;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-family: serif;
            font-weight: bold;
            border-radius: 4px;
        }
        .e { grid-column: 1; grid-row: 1; }
        .f { grid-column: 2; grid-row: 1; }
        .g { grid-column: 3; grid-row: 1; }
        .m { grid-column: 1; grid-row: 2; }
        .i { grid-column: 2; grid-row: 2; }
        .j { grid-column: 3; grid-row: 2; }

    </style>
</head>
<body>
    <div class="grid-container">
        <div class="item a">A</div>
        <div class="item b">B</div>
        <div class="item c">C</div>
        <div class="inner-box">
            <div class="inner-item e">E</div>
            <div class="inner-item f">F</div>
            <div class="inner-item g">G</div>
            <div class="inner-item m">M</div>
            <div class="inner-item i">I</div>
            <div class="inner-item j">J</div>
        </div>
    </div>
</body>
</html>
