<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 5a - Site Responsivo</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        nav {
            background: #333;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
            font-size: 14px;
        }
        nav a:hover {
            color: #ffc107;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 30px;
            max-width: 1000px;
            margin: 0 auto;
            grid-auto-rows: 120px;
        }
        .item {
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .item:hover {
            transform: scale(1.05);
        }
        .item1 { 
            background: #ff9800; 
            grid-column: 1 / 2;
            grid-row: 1 / 2;
        }
        .item2 { 
            background: #f4a9a8; 
            grid-column: 2 / 3;
            grid-row: 1 / 3;
            color: #333;
        }
        .item3 { 
            background: #c8e6c9; 
            grid-column: 3 / 5;
            grid-row: 1 / 2;
        }
        .item4 { 
            background: #b3cce6; 
            grid-column: 1 / 2;
            grid-row: 2 / 3;
        }
        .item5 { 
            background: #d4a574; 
            grid-column: 3 / 4;
            grid-row: 2 / 3;
        }
        .item6 { 
            background: #e8b4a8; 
            grid-column: 4 / 5;
            grid-row: 2 / 3;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            padding: 0;
        }
        .item7 { 
            background: #d4a5a5; 
            grid-column: 4 / 5;
            grid-row: 2 / 3;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            padding: 0;
            margin-top: 50px;
        }
        .item8 { 
            background: #c9d4a5; 
            grid-column: 4 / 5;
            grid-row: 2 / 3;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            padding: 0;
            margin-top: 100px;
        }
        .item9 { 
            background: #d4c5a5; 
            grid-column: 4 / 5;
            grid-row: 2 / 3;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            padding: 0;
            margin-top: 150px;
        }
        .item10 { 
            background: #ff9800; 
            grid-column: 1 / 3;
            grid-row: 3 / 4;
        }
        .item11 { 
            background: #c9d4a5; 
            grid-column: 3 / 5;
            grid-row: 3 / 4;
        }
        @media (max-width: 768px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
            .item2 {
                grid-row: 1 / 4;
            }
            .item3 {
                grid-column: 1 / 2;
                grid-row: 2 / 3;
            }
            .item4 {
                grid-column: 2 / 3;
                grid-row: 2 / 3;
            }
            .item5 {
                grid-column: 1 / 2;
                grid-row: 3 / 4;
            }
            .item6, .item7, .item8, .item9 {
                grid-column: 2 / 3;
                grid-row: 3 / 4;
                margin: 0;
            }
            .item10 {
                grid-column: 1 / 2;
                grid-row: 4 / 5;
            }
            .item11 {
                grid-column: 2 / 3;
                grid-row: 4 / 5;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="#web">WEB</a>
        <a href="#html">HTML</a>
        <a href="#css">CSS</a>
        <a href="#animate">Animate</a>
        <a href="#position">Position</a>
        <a href="#flex">Flex</a>
        <a href="#grid">Grid</a>
    </nav>

    <div class="container">
        <div class="item item1" id="web">WEB</div>
        <div class="item item2" id="html">HTML</div>
        <div class="item item3" id="css">CSS</div>
        <div class="item item4" id="animate">Animate</div>
        <div class="item item5" id="position">Position</div>
        <div class="item item6" id="flex">Flex</div>
        <div class="item item7">Flex</div>
        <div class="item item8">Flex</div>
        <div class="item item9">Flex</div>
        <div class="item item10" id="grid">Grid</div>
        <div class="item item11">Grid</div>
    </div>
</body>
</html>
