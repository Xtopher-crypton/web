<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade 3 - Lista de Usuários</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container-lista {
            width: 450px;
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px;
            border-radius: 8px;
        }
        .item-usuario {
            display: flex;
            align-items: center;
            padding: 15px 10px;
            border-bottom: 1px solid #eee;
            gap: 20px;
        }
        .item-usuario:last-child {
            border-bottom: none;
        }
        .foto-perfil {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #ddd;
            object-fit: cover;
        }
        .info-usuario {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .nome-usuario {
            font-weight: bold;
            font-size: 16px;
            color: #333;
        }
        .endereco-usuario {
            font-size: 13px;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container-lista">
        <div class="item-usuario">
            <img src="https://randomuser.me/api/portraits/women/1.jpg" alt="Linda Hart" class="foto-perfil">
            <div class="info-usuario">
                <span class="nome-usuario">Linda Hart</span>
                <span class="endereco-usuario">6765 Shady Ln Dr</span>
            </div>
        </div>
        <div class="item-usuario">
            <img src="https://randomuser.me/api/portraits/men/2.jpg" alt="Roger Medina" class="foto-perfil">
            <div class="info-usuario">
                <span class="nome-usuario">Roger Medina</span>
                <span class="endereco-usuario">2420 Paddock Way</span>
            </div>
        </div>
        <div class="item-usuario">
            <img src="https://randomuser.me/api/portraits/men/3.jpg" alt="Dean Sullivan" class="foto-perfil">
            <div class="info-usuario">
                <span class="nome-usuario">Dean Sullivan</span>
                <span class="endereco-usuario">6727 Airplane Ave</span>
            </div>
        </div>
        <div class="item-usuario">
            <img src="https://randomuser.me/api/portraits/women/4.jpg" alt="Elizabeth Austin" class="foto-perfil">
            <div class="info-usuario">
                <span class="nome-usuario">Elizabeth Austin</span>
                <span class="endereco-usuario">6685 Blossom Hill Rd</span>
            </div>
        </div>
    </div>
</body>
</html>
