<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Questao 4a - Centralização com Position</title>
    <style>
        body{
            background-color: lightblue;
            height: 100vh;
            margin: 0;
            position: relative;
        }

        .foguete{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
        }
    </style>
</head>
<body>
    <div class="foguete">🚀</div>
</body>
</html>
