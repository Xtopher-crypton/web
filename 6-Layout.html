<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade 6 - Grid Layout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        .container-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .bloco {
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .bloco-1 { background-color: #f39c12; grid-column: 1 / 2; grid-row: 1 / 2; }
        .bloco-2 { background-color: #f5b7b1; grid-column: 2 / 3; grid-row: 1 / 3; }
        .bloco-3 { background-color: #d1f2eb; grid-column: 3 / 5; grid-row: 1 / 2; }
        .bloco-4 { background-color: #a9cce3; grid-column: 1 / 2; grid-row: 2 / 3; }
        .bloco-5 { background-color: #f1c40f; grid-column: 1 / 3; grid-row: 3 / 4; }
        .bloco-6 { background-color: #abebc6; grid-column: 3 / 4; grid-row: 2 / 4; }
        
        /* Círculos na lateral direita */
        .circulos {
            grid-column: 4 / 5;
            grid-row: 2 / 4;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
        }
        .circulo {
            width: 25px;
            height: 25px;
            background-color: #d2b4de;
            border-radius: 50%;
        }

        /* Responsividade para telas menores que 600px */
        @media (max-width: 600px) {
            .container-grid {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                gap: 15px;
            }
            .bloco {
                grid-column: auto !important;
                grid-row: auto !important;
                height: 80px;
            }
            .circulos {
                grid-column: auto !important;
                grid-row: auto !important;
                flex-direction: row;
                justify-content: center;
                gap: 10px;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>
    <h1>Atividade 6 - CSS Grid</h1>
    <div class="container-grid">
        <div class="bloco bloco-1">1</div>
        <div class="bloco bloco-2">2</div>
        <div class="bloco bloco-3">3</div>
        <div class="bloco bloco-4">4</div>
        <div class="bloco bloco-5">5</div>
        <div class="bloco bloco-6">6</div>
        <div class="circulos">
            <div class="circulo"></div>
            <div class="circulo"></div>
            <div class="circulo"></div>
            <div class="circulo"></div>
        </div>
    </div>
    <p style="text-align: center; margin-top: 20px;">Redimensione a tela para menos de 600px para ver a responsividade.</p>
</body>
</html>
